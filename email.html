<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Phishing Analysis - CyberGuard AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <nav class="border-b border-slate-900 bg-slate-950 px-6 py-4">
        <a href="../index.html" class="flex items-center space-x-3 text-xl font-bold text-cyan-400 w-fit">
            <i class="fa-solid fa-arrow-left text-sm text-slate-400 hover:text-white mr-2"></i>
            <span>CYBER<span class="text-white">GUARD AI</span></span>
        </a>
    </nav>

    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-white mb-2 flex items-center gap-2">
                <i class="fa-solid fa-envelope text-cyan-400"></i> Email Phishing Analysis
            </h1>
            <p class="text-sm text-slate-400">Paste the email body text below to analyze threat score and structural manipulation markers.</p>
        </div>

        <div class="bg-slate-900/40 rounded-2xl border border-slate-800 p-6 shadow-xl mb-8">
            <textarea id="emailInput" rows="8" placeholder="Paste full email structure here (e.g., Dear customer, your bank account is suspended immediately. Click here to verify...)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm text-slate-300 focus:outline-none focus:border-cyan-500 transition-colors resize-none mb-4"></textarea>
            
            <button onclick="analyzeEmail()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 text-sm font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-cyan-500/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Run AI Analysis
            </button>
        </div>

        <!-- Result Container -->
        <div id="resultContainer" class="hidden bg-slate-900/30 rounded-2xl border border-slate-800 p-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-4 mb-4 gap-4">
                <div>
                    <h3 class="text-lg font-bold" id="threatStatus">Analysis Summary</h3>
                    <p class="text-xs text-slate-500" id="timestamp"></p>
                </div>
                <div class="px-4 py-2 rounded-xl text-center min-w-32" id="scoreBadge">
                    <span class="block text-2xl font-extrabold" id="threatScore">0%</span>
                    <span class="text-[10px] uppercase font-bold tracking-wider opacity-80">Threat Score</span>
                </div>
            </div>
            <div class="space-y-4">
                <h4 class="text-sm font-semibold text-white">Detection Points Identified:</h4>
                <ul class="space-y-2.5 text-sm text-slate-400" id="flaggedIndicators"></ul>
            </div>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
