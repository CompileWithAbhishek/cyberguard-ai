<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker - CyberGuard AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">
    <nav class="border-b border-slate-900 bg-slate-950 px-6 py-4">
        <a href="../index.html" class="flex items-center space-x-3 text-xl font-bold text-rose-400 w-fit">
            <i class="fa-solid fa-arrow-left text-sm text-slate-400 hover:text-white mr-2"></i>
            <span>CYBER<span class="text-white">GUARD AI</span></span>
        </a>
    </nav>
    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-white mb-2 flex items-center gap-2">
                <i class="fa-solid fa-key text-rose-400"></i> Password Strength Checker
            </h1>
            <p class="text-sm text-slate-400">Assess complexity thresholds locally in the sandbox. Zero network egress.</p>
        </div>
        <div class="bg-slate-900/40 rounded-2xl border border-slate-800 p-6 shadow-xl mb-8">
            <input type="password" id="passInput" placeholder="Enter string password to evaluate" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm text-slate-300 focus:outline-none focus:border-rose-500 transition-colors mb-4">
            <button onclick="checkPassword()" class="w-full bg-rose-500 hover:bg-rose-600 text-slate-950 text-sm font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-rose-500/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-vault"></i> Assess Complexity
            </button>
        </div>
        <div id="passResult" class="hidden bg-slate-900/30 rounded-2xl border border-slate-800 p-6"></div>
    </main>
    <script src="../script.js"></script>
</body>
</html>
